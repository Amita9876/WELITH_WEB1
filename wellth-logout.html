<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logged Out - WELLTH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; background: #f8f6f3; }
    .logout-card { max-width: 420px; width: 100%; background: #ffffff; border-radius: 16px; padding: 2.5rem; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.08); text-align: center; }
    .logout-card h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 1rem; color: #1a2332; }
    .logout-card p { color: #6b7280; line-height: 1.7; margin-bottom: 1.5rem; }
    .logout-card a { text-decoration: none; color: #2ec4b6; font-weight: 600; }
  </style>
</head>
<body>
  <div class="logout-card">
    <h1>Signing Out</h1>
    <p>You have been logged out successfully. Redirecting back to the login page shortly.</p>
    <p>If the page does not redirect automatically, <a href="wellth-login.html">click here to sign in again</a>.</p>
  </div>

  <script>
    const CURRENT_USER_KEY = 'wellthCurrentUser';
    window.addEventListener('load', () => {
      localStorage.removeItem(CURRENT_USER_KEY);
      setTimeout(() => {
        window.location.href = 'wellth-login.html';
      }, 1200);
    });
  </script>
</body>
</html>
